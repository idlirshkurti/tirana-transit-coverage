version: "3.9"

services:
  dagster:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: tirana_dagster
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
    ports:
      - "3000:3000"
    volumes:
      - ./pipeline:/app
      - ./data:/data
      - dagster_home:/opt/dagster/dagster_home

volumes:
  dagster_home:
