name: Pipeline Run

# Populate MotherDuck tables by materialising all Dagster assets.
# Triggers:
#   - Manually via workflow_dispatch (one-off or ad-hoc runs)
#   - On a schedule: every day at 03:00 UTC
#   - On push to main (so the DB stays fresh after code changes)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  push:
    branches: [main]
    paths:
      - "pipeline/**"

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install GDAL system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgdal-dev gdal-bin libspatialindex-dev

      - name: Install pipeline package
        run: |
          cd pipeline
          pip install -e .

      - name: Create data directories
        run: mkdir -p data/raw/gtfs data/raw/opendata

      - name: Materialise all Dagster assets
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE: tirana_transit
          DAGSTER_HOME: /tmp/dagster_home
          RAW_DATA_DIR: ${{ github.workspace }}/data/raw
        run: |
          mkdir -p $DAGSTER_HOME
          cd pipeline
          dagster asset materialize \
            --select "*" \
            -m tirana_pipeline

      - name: Verify row counts in MotherDuck
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE: tirana_transit
        run: |
          python - <<'EOF'
          import duckdb, os

          token = os.environ["MOTHERDUCK_TOKEN"]
          db = os.environ["MOTHERDUCK_DATABASE"]

          conn = duckdb.connect(f"md:{db}?motherduck_token={token}")
          conn.execute("LOAD spatial;")

          tables = ["stops", "routes", "neighbourhoods", "staging_businesses_by_region"]
          for t in tables:
              count = conn.execute(f"SELECT COUNT(*) FROM {t}").fetchone()[0]
              print(f"{t}: {count} rows")
              if count == 0:
                  raise SystemExit(f"Table {t} is empty after pipeline run!")

          conn.close()
          print("All tables populated successfully.")
          EOF
