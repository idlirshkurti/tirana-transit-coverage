name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install GDAL system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgdal-dev gdal-bin libspatialindex-dev

      - name: Install pipeline package
        run: |
          cd pipeline
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          cd pipeline
          ruff check .

      - name: Run tests
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE: tirana_transit
        run: |
          cd pipeline
          pytest tests/ -v --tb=short
