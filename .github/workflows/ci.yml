name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: tirana_test
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GDAL system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libspatialindex-dev

      - name: Install pipeline package
        run: |
          cd pipeline
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          cd pipeline
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://dev:dev@localhost:5432/tirana_test
        run: |
          cd pipeline
          pytest tests/ -v --tb=short
